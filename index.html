<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Astrojigs • Portfolio</title>
  <meta name="description" content="Portfolio of Jigar (Astrojigs) — data, ML, GIS, and simulations." />
  <style>
    html, body { height: 100%; margin: 0; background: #0b1020; }
    .wrap { position: relative; height: 100vh; }
    iframe { width: 100%; height: 100%; border: 0; display: block; }

    /* Hide Streamlit's embed meta bar (host-side element below the iframe) */
    [data-testid="stEmbeddedAppMetaInfoBar"],
    [class*="embeddedAppMetaInfoBar_container"] { display: none !important; }

    /* Fallback: a slim mask in case the meta bar renders inside the iframe shell */
    .mask { position: absolute; left: 0; right: 0; bottom: 0; height: 44px;
            background: #0b1020; pointer-events: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <iframe
      src="https://astrojigs.streamlit.app/?embed=true"
      allow="clipboard-read; clipboard-write; fullscreen; geolocation"
      referrerpolicy="strict-origin-when-cross-origin"
      loading="eager">
    </iframe>
    <div class="mask" aria-hidden="true"></div>
  </div>

  <noscript>
    <p>JavaScript is required. Open the app directly:
      <a href="https://astrojigs.streamlit.app/">astrojigs.streamlit.app</a>
    </p>
  </noscript>
</body>
</html>
